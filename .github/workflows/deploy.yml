name: Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @vc/db db:generate
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test

  migrate-db:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @vc/db migrate:deploy
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}

  api-image-smoke-test:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build api image
        run: docker build -f apps/api/Dockerfile -t vc-api:ci .
      - name: Boot container and check health
        run: |
          docker run -d --name vc-api-smoke -p 4000:4000 vc-api:ci
          for i in $(seq 1 10); do
            if curl -sf http://localhost:4000/health; then
              echo "API is healthy"
              exit 0
            fi
            sleep 1
          done
          echo "API did not become healthy in time"
          docker logs vc-api-smoke
          exit 1
      - name: Tear down container
        if: always()
        run: docker rm -f vc-api-smoke

  deploy-api:
    needs: [migrate-db, api-image-smoke-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm install -g @railway/cli
      - name: Deploy api to Railway
        working-directory: apps/api
        run: railway up --service "${{ secrets.RAILWAY_SERVICE_ID }}" --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  deploy-web:
    needs: migrate-db
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: npm install -g vercel
      - name: Pull Vercel project settings
        working-directory: apps/web
        run: vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      - name: Build
        working-directory: apps/web
        run: vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"
      - name: Deploy
        working-directory: apps/web
        run: vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"
